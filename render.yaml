services:
  - type: web
    name: stop-ao
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        sync: false
      - key: MAINTENANCE_SECRET
        generateValue: true
      - key: ROOM_RETENTION_ACTIVE_HOURS
        value: 24
      - key: ROOM_RETENTION_FINISHED_HOURS
        value: 168
      - key: ROOM_CLEANUP_INTERVAL_MINUTES
        value: 15
